<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link
     href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    .signup-card{
        width: 100%;
        max-width: 420px;
    }
     .bank-logo {
        height: auto;
        width: 260px;
        max-width: 100%;
        object-fit: contain;
        display: block;
     }
     </style>
</head>
<body class="bg-light">
  <div class="min-vh-100 d-flex align-items-center">
    <div class="container">
    <div class="row justify-content-center">
    <div class="col-12 d-flex justify-content-center">
    <div class="card shadow-sm bg-body-tertiary border-0 rounded-4 signup-card">
            <div class="card-body p-4">


     <div class="text-center mb-3">
                <img src="/static/bank.png" alt="Bank logo" class="bank-logo mx-auto" />
              </div>

              <h1 class="h4 mb-1 text-center">Create account</h1>
              <p class="text-muted mb-4 text-center">Open your new banking account</p>

              <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

              <form id="signupForm" action="/signup" method="post">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">First Name</label>
            <input name="first_name" class="form-control" required />
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Last Name</label>
            <input name="last_name" class="form-control" required />
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" required />
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" required />
    </div>

    <div class="mb-3">
        <label class="form-label">SSN</label>
        <input name="ssn" class="form-control" placeholder="XXX-XX-XXXX" required />
    </div>
    <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input name="phone" type="tel" class="form-control" required />
    </div>
    <div class="mb-3">
        <label class="form-label">Address</label>
        <textarea name="address" class="form-control" rows="2" required></textarea>
    </div>

    <button type="submit" class="btn btn-primary w-100">Submit Application</button>
</form>

              <hr class="my-4" />
              <div class="d-flex justify-content-between">
                <a href="/login" class="link-secondary">Sign in</a>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const MIN_AGE = 18;
    const dobInput = document.getElementById("dob");
    const form = document.getElementById("signupForm");
    const errorBox = document.getElementById("errorBox");
    const minAgeText = document.getElementById("minAgeText");

    minAgeText.textContent = `${MIN_AGE} years old`;

    function calcAge(dob, today) {
        let age = today.getFullYear() - dob.getFullYear();
        const m =today.getMonth() - dob.getMonth();
        if (m < 0 || (m === 0 && today.getDate()< dob.getDate())) age--;
        return age;
    }
    (function setDobMax() {
      const today = new Date();
      const max = new Date(today.getFullYear() - MIN_AGE, today.getMonth(), today.getDate());
      dobInput.max = max.toISOString().slice(0, 10);
    })();

    form.addEventListener("submit", (e) => {
      errorBox.classList.add("d-none");
      errorBox.textContent = "";

      const value = dobInput.value;
      if (!value) {
        e.preventDefault();
        errorBox.textContent = "Date of birth is required.";
        errorBox.classList.remove("d-none");
        return;
      }

      const dob = new Date(value + "T00:00:00");
      if (Number.isNaN(dob.getTime())) {
        e.preventDefault();
        errorBox.textContent = "Invalid date of birth.";
        errorBox.classList.remove("d-none");
        return;
      }

      const today = new Date();
      const age = calcAge(dob, today);

      if (age < MIN_AGE) {
        e.preventDefault();
        errorBox.textContent = `You must be at least ${MIN_AGE} years old to sign up.`;
        errorBox.classList.remove("d-none");
        return;
      }

      // No backend: keep it simple and don't post anywhere.
      e.preventDefault();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
