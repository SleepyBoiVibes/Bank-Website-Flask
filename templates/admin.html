<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
             background: white; 
             padding: 40px; 
            }

        
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
        }

        th, td { 
            text-align: left; 
            padding: 12px; 
            border-bottom: 1px solid white; 
        }

        th { 
            background: white; color: grey; 
        }

        .btn { 
            padding: 8px 12px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.8; 
        }

        .accept { 
            background: green; 
            color: white; 
            margin-right: 5px; 
        }

        .delete { 
            background: red; 
            color: white; 
        }

        .status { 
            font-size: 0.75px; 
            padding: 4px 8px; 
            border-radius: 12px; 
            background: yellow; 
            color: red; 
            font-weight: bold; 
        }

        .btn-logout {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: red;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">
    <h1>Admin Panel</h1>
    <div style="text-align: right; margin-bottom: 10px;">
    <a href="/login" class="btn-logout">Logout</a>
</div>
    </div>


    <h2>Pending Account Approvals</h2>
    <hr>
    
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone Number</th>
                <th>SSN</th>
                <th>Address</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in pending_users %}
            <tr>
                <td>{{ user.first_name }} {{ user.last_name }}</td>
                <td>{{ user.phone }}</td>
                <td>{{ user.ssn }}</td>
                <td>{{ user.address }}</td>
                <td>
                    <a href="/admin/approve/{{ user.id }}" class="btn accept" style="text-decoration: none;">Approve</a>
            
                    <a href="/admin/delete/{{ user.id }}" class="btn delete" style="text-decoration: none;" 
                        onclick="return confirm('Are you sure you want to decline this user?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
