<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transfer Money</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body class="bg-light">
  <div class="min-vh-100 d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">
          <div class="card shadow-sm bg-body-tertiary border-0 rounded-4">
            <div class="card-body p-4">
              <h1 class="h4 mb-1">Transfer money</h1>
              <p class="text-muted mb-4">
                Send funds to another user by bank account number.
              </p>

              <form action="/transfer" method="post">
                <div class="mb-3">
                  <label for="recipient_account" class="form-label">
                    Recipient account number
                  </label>
                  <input
                    id="recipient_account"
                    name="recipient_account"
                    type="text"
                    class="form-control"
                    inputmode="numeric"
                    autocomplete="off"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="amount" class="form-label">Amount</label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input
                      id="amount"
                      name="amount"
                      type="number"
                      class="form-control"
                      min="0.01"
                      step="0.01"
                      required
                    />
                  </div>
                  <div class="form-text">
                    Transfer will only complete if the recipient exists and you have sufficient balance.
                  </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Send transfer
                </button>
              </form>

              <hr class="my-4" />

              <div class="d-flex justify-content-between">
               
                <a href="/dashboard" class="link-secondary">My Account</a>
                <a href="/deposit" class="link-secondary">Deposit</a>
              </div>

       
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
